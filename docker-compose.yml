version: '3.9'

# Smart Email Assistant — Local Development
#
# Usage:
#   1. Copy .env.local.example to .env.local and fill in GEMINI_API_KEY
#   2. docker-compose up
#   3. Backend: http://localhost:8080
#      Frontend: run separately with cd Frontend/email-writer-frontend && npm start
#
# The Gemini API key must be set — it cannot be mocked locally.
# All other values are safe defaults for local development only.

services:

  # ── PostgreSQL database ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartemail-db
    environment:
      POSTGRES_DB:       emailwriter
      POSTGRES_USER:     emailwriter
      POSTGRES_PASSWORD: emailwriter_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailwriter -d emailwriter"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Backend/email-writer-backend/Dockerfile
    container_name: smartemail-backend
    environment:
      # Database — points to the postgres service above
      DB_URL:       jdbc:postgresql://postgres:5432/emailwriter
      DB_USERNAME:  emailwriter
      DB_PASSWORD:  emailwriter_local_dev

      # JWT — local dev secret (min 64 chars for HS512)
      JWT_SECRET: local-dev-jwt-secret-replace-this-in-production-must-be-64-chars!!

      # Gemini API — set GEMINI_API_KEY in your environment or .env file
      GEMINI_API_URL:      https://generativelanguage.googleapis.com
      GEMINI_API_ENDPOINT: /v1beta/models/gemini-2.0-flash:generateContent
      GEMINI_API_KEY:      ${GEMINI_API_KEY}

      # App config
      SPRING_PROFILES_ACTIVE: prod
      CORS_ALLOWED_ORIGINS:   http://localhost:3000,http://localhost:3001
      PORT: 8080

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
    name: smartemail-postgres-data
