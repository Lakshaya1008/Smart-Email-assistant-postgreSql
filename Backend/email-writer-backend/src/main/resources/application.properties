# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Server ? Render injects $PORT
server.port=${PORT:8080}

# ?? Database ??????????????????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
# Removed spring.jpa.database-platform ? it is deprecated.
# Keep only the canonical dialect property:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Disabled in production ? SQL logging exposes schema details and hurts performance
spring.jpa.show-sql=false

# ?? Gemini API ????????????????????????????????????????????????????????????
gemini.api.url=${GEMINI_API_URL}
gemini.api.endpoint=${GEMINI_API_ENDPOINT}
gemini.api.key=${GEMINI_API_KEY}

# ?? JWT ???????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds
jwt.expiration=86400000

# ?? Actuator ?????????????????????????????????????????????????????????????
# Expose only the health endpoint ? Render uses /actuator/health for health checks.
# Set health check path in Render dashboard to: /actuator/health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ?? Logging ???????????????????????????????????????????????????????????????
# Keep application logs at DEBUG only in dev ? INFO in production.
# Security DEBUG logs dump authentication token details ? never in production.
logging.level.com.email.writer=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ?? CORS ??????????????????????????????????????????????????????????????????
# Read by SecurityConfig via @Value("${cors.allowed-origins:}")
# Set this in Render env vars: CORS_ALLOWED_ORIGINS=https://your-frontend.onrender.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}